name: Sync Upstream

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "Anshad2u"
          git config user.email "anshad2u@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/CJackHwang/ds2api.git
          git remote -v

      - name: Fetch upstream changes
        run: git fetch upstream

      - name: Merge upstream into main
        run: |
          git checkout main
          git merge upstream/main --no-edit

      - name: Push to fork
        run: git push origin main
